name: C/C++ CI on linux-gcc

on:
  push:
    branches: [ "master", "main", "dev"]
  pull_request:
    branches: [ "master", "main", "dev"]

permissions:
  contents: read

env:
  MIN_CLANG_VERSION: 19

jobs:
  build-and-test:
    name: Build and test (C++${{ matrix.stdcxx }}, ${{ matrix.kind }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - stdcxx: 20
            kind: shared
            mode: coverage
            cc: gcc
            cxx: g++
            coverage: true
            experimental: false
          - stdcxx: 23
            kind: shared
            mode: coverage
            cc: gcc
            cxx: g++
            coverage: true
            experimental: false
          - stdcxx: 23
            kind: static
            mode: debug
            cc: gcc
            cxx: g++
            coverage: false
            experimental: false
          # Keep C++26 non-blocking until compiler and library support settles.
          # - stdcxx: 26
          #   kind: shared
          #   mode: debug
          #   cc: gcc-14
          #   cxx: g++-14
          #   coverage: false
          #   experimental: true
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Update submodules
      run: git submodule update --init --recursive
    - name: setup xmake
      uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1.2.5
      with:
        xmake-version: 3.0.9
    - name: Update apt
      run: sudo apt update -y
    - name: Install lcov
      run: sudo apt install lcov -y
    - name: Configure
      run: xmake f -m ${{ matrix.mode }} -k ${{ matrix.kind }} --stdcxx=${{ matrix.stdcxx }} --cc=${{ matrix.cc }} --cxx=${{ matrix.cxx }} --enable_simdjson=y --enable_protocol=y --enable_rapidjson=y --enable_communication=y --enable_jsonrpc=y --enable_fmt=y --enable_pugixml=y --enable_libfyaml=y --enable_tomlplusplus=y --enable_tests=y --ccache=n -vy
    - name: Build
      run: xmake -y
    - name: Run Test
      run: xmake test -v
    - name: Generate coverage
      if: ${{ matrix.coverage }}
      run: xmake run coverage-report
    - name: Upload coverage reports to Codecov
      if: ${{ matrix.coverage }}
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        files: build/coverage.info
        fail_ci_if_error: true
        flags: linux-gcc-cxx${{ matrix.stdcxx }}-${{ matrix.kind }}
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  sanitizers:
    name: ${{ matrix.mode }} focused regression (supported Clang, C++23)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [asan, ubsan, tsan]
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Update submodules
      run: git submodule update --init --recursive
    - name: setup xmake
      uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1.2.5
      with:
        xmake-version: 3.0.9
    - name: Select supported Clang
      run: |
        clang_major="$(clang++ -dumpversion)"
        clang_major="${clang_major%%.*}"
        if [ "${clang_major}" -ge "${MIN_CLANG_VERSION}" ]; then
          echo "CC=clang" >> "${GITHUB_ENV}"
          echo "CXX=clang++" >> "${GITHUB_ENV}"
          clang++ --version
        else
          sudo apt-get update
          sudo apt-get install -y "clang-${MIN_CLANG_VERSION}" "libclang-rt-${MIN_CLANG_VERSION}-dev"
          echo "CC=clang-${MIN_CLANG_VERSION}" >> "${GITHUB_ENV}"
          echo "CXX=clang++-${MIN_CLANG_VERSION}" >> "${GITHUB_ENV}"
          "clang++-${MIN_CLANG_VERSION}" --version
        fi
    - name: Configure
      run: xmake f -m ${{ matrix.mode }} -k static --stdcxx=23 --cc=${CC} --cxx=${CXX} --ld=${CXX} --enable_protocol=y --enable_rapidjson=y --enable_jsonrpc=y --enable_tests=y --ccache=n -vy
    - name: Build serializer regression
      if: ${{ matrix.mode != 'tsan' }}
      run: xmake build test_binary_serializer
    - name: Run serializer regression
      if: ${{ matrix.mode != 'tsan' }}
      run: xmake run test_binary_serializer
    - name: Build RPC regression
      run: xmake build test_neko_rpc_backend
    - name: Run RPC regression
      run: xmake run test_neko_rpc_backend

  fuzz-smoke:
    name: Fuzz smoke (supported Clang, ASan+UBSan)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Update submodules
      run: git submodule update --init --recursive
    - name: setup xmake
      uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1.2.5
      with:
        xmake-version: 3.0.9
    - name: Select supported Clang
      run: |
        clang_major="$(clang++ -dumpversion)"
        clang_major="${clang_major%%.*}"
        if [ "${clang_major}" -ge "${MIN_CLANG_VERSION}" ]; then
          echo "CC=clang" >> "${GITHUB_ENV}"
          echo "CXX=clang++" >> "${GITHUB_ENV}"
          clang++ --version
        else
          sudo apt-get update
          sudo apt-get install -y "clang-${MIN_CLANG_VERSION}" "libclang-rt-${MIN_CLANG_VERSION}-dev"
          echo "CC=clang-${MIN_CLANG_VERSION}" >> "${GITHUB_ENV}"
          echo "CXX=clang++-${MIN_CLANG_VERSION}" >> "${GITHUB_ENV}"
          "clang++-${MIN_CLANG_VERSION}" --version
        fi
    - name: Configure
      run: xmake f -m debug -k static --stdcxx=23 --cc=${CC} --cxx=${CXX} --ld=${CXX} --enable_protocol=y --enable_rapidjson=y --enable_jsonrpc=y --enable_tests=y --fuzzer_test=y --ccache=n -vy
    - name: Build fuzz targets
      run: |
        xmake build test_json_proto
        xmake build test_rpc_wire_fuzz
    - name: Run bounded fuzz smoke
      run: |
        xmake run test_json_proto -- -runs=1000 -max_len=1048576 -timeout=10
        xmake run test_rpc_wire_fuzz -- -runs=1000 -max_len=1048576 -timeout=10
